<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Operations Portal — Template</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: #f0eee9; }

    /* floating theme toggle — outside the canvas world, always reachable */
    .ip-themebar {
      position: fixed; top: 16px; right: 16px; z-index: 1000;
      display: flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      border: 1px solid rgba(20,28,45,0.12); border-radius: 999px;
      padding: 3px; box-shadow: 0 4px 16px rgba(20,28,45,0.12);
      font-family: "IBM Plex Sans", system-ui, sans-serif;
    }
    html[data-theme="dark"] .ip-themebar {
      background: rgba(34,25,19,0.92); border-color: rgba(236,224,207,0.16);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45);
    }
    .ip-themebar button {
      display: flex; align-items: center; gap: 7px;
      height: 32px; padding: 0 13px; border: none; border-radius: 999px;
      background: transparent; cursor: pointer; color: #69717f;
      font-family: inherit; font-size: 12.5px; font-weight: 600; letter-spacing: -0.1px;
    }
    html[data-theme="dark"] .ip-themebar button { color: #ab9881; }
    .ip-themebar button svg { width: 15px; height: 15px; }
    .ip-themebar button[aria-pressed="true"] { background: #4338ca; color: #fff; }
    html[data-theme="dark"] .ip-themebar button[aria-pressed="true"] { background: #9aa2ff; color: #1a1209; }
  </style>

  <!-- set theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ip-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="ip-themebar" role="group" aria-label="Theme">
    <button id="ip-light" type="button" onclick="ipSetTheme('light')" aria-pressed="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5v2.5M12 20v2.5M3.5 3.5l1.8 1.8M18.7 18.7l1.8 1.8M1.5 12H4M20 12h2.5M3.5 20.5l1.8-1.8M18.7 5.3l1.8-1.8"/></svg>
      Light
    </button>
    <button id="ip-dark" type="button" onclick="ipSetTheme('dark')" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5z"/></svg>
      Dark
    </button>
  </div>

  <div id="root"></div>

  <script>
    function ipSetTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('ip-theme', t); } catch (e) {}
      var l = document.getElementById('ip-light'), d = document.getElementById('ip-dark');
      if (l) l.setAttribute('aria-pressed', String(t === 'light'));
      if (d) d.setAttribute('aria-pressed', String(t === 'dark'));
    }
    // sync toggle to whatever was restored pre-paint
    (function () {
      var t = document.documentElement.getAttribute('data-theme') || 'light';
      var l = document.getElementById('ip-light'), d = document.getElementById('ip-dark');
      if (l) l.setAttribute('aria-pressed', String(t === 'light'));
      if (d) d.setAttribute('aria-pressed', String(t === 'dark'));
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="parts.jsx"></script>
  <script type="text/babel" src="directionA.jsx"></script>
  <script type="text/babel" src="directionB.jsx"></script>
  <script type="text/babel" src="directionC.jsx"></script>
  <script type="text/babel" src="foundations.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
          <DCSection id="directions" title="Tool directory — directions" subtitle="Landing page that launches the portal's tools · same system, three layouts">
            <DCArtboard id="console" label="A · Directory — categorized grid" width={1440} height={1024}>
              <DirConsole />
            </DCArtboard>
            <DCArtboard id="launcher" label="B · Launcher — search-first" width={1440} height={1024}>
              <DirLauncher />
            </DCArtboard>
            <DCArtboard id="dashboard" label="C · Workspace — catalog + rail" width={1440} height={1024}>
              <DirDashboard />
            </DCArtboard>
          </DCSection>

          <DCSection id="foundations" title="Foundations" subtitle="Locked styling — type, color, status & components (toggles with the theme)">
            <DCArtboard id="styletile" label="Design system" width={1440} height={1080}>
              <Foundations />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
